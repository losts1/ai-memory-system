name: CI

on:
  push:
    branches: [master, "phase*"]
  pull_request:
    branches: [master]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[full]" --quiet
          pip install ruff pytest --quiet

      - name: Ruff lint
        run: |
          ruff check scripts/ tests/ || true   # non-blocking for now

      - name: Basic syntax & import smoke
        run: |
          python -m py_compile scripts/cli.py
          python -c "from scripts import cli; print('CLI module loads')"

      - name: CLI smoke tests (--help and init)
        run: |
          python scripts/cli.py --help
          python scripts/cli.py init
          python scripts/cli.py search --help
          python scripts/cli.py traverse --help
          python scripts/cli.py sync --help
          python scripts/cli.py learn-sync --help
          python scripts/cli.py state --help
          python scripts/cli.py backfill --help

      - name: Run pytest smoke tests (if any)
        run: |
          python -m pytest tests/ -q --tb=line || true
